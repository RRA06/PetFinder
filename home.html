<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home - PetFinder</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="phone-container">

    <div class="home-header">

        <div class="logo">
            <i class="fa-solid fa-paw"></i>
            <span>PetFinder</span>
        </div>

        <i
            class="fa-regular fa-bell"
            onclick="window.location.href='notificaciones.html'">
        </i>

    </div>

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            placeholder="Buscar mascotas, lugares..."
        >

    </div>

    <h3 class="section-title">
        Acciones rápidas
    </h3>

    <div class="quick-actions">
        <div
            class="action-card green"
            onclick="window.location.href='veterinarias.html'">

        <i class="fa-solid fa-hospital"></i>

        <span>Veterinarias</span>

        </div>

        <div
            class="action-card red"
            onclick="window.location.href='reportar.html'">

            <i class="fa-solid fa-circle-exclamation"></i>

            <span>Reportar</span>

        </div>

        <div
            class="action-card blue"
            onclick="window.location.href='buscar.html'">

            <i class="fa-solid fa-magnifying-glass"></i>

            <span>Buscar</span>

        </div>

        <div
class="action-card green"
onclick="window.location.href='escanear-qr.html'">

    <i class="fa-solid fa-qrcode"></i>

    <span>Escanear</span>

</div>

    </div>

    <div class="section-header">

        <h3>Alertas recientes</h3>

        <a href="#">Ver todas</a>

    </div>

    <div class="alert-card" onclick="window.location.href='avistamiento.html'">

        <img src="https://placedog.net/200/200">

        <div>

            <h4>Max</h4>

            <p>Miraflores, Lima</p>

        </div>

    </div>

    <div class="alert-card">

        <img src="https://placecats.com/200/200">

        <div>

            <h4>Luna</h4>

            <p>San Isidro, Lima</p>

        </div>

    </div>

    <div class="section-header">

        <h3>Comunidad activa</h3>

        <a href="#">Ver todas</a>

    </div>

    <div class="community-card">

        <strong>María Torres</strong>

        <p>
            Encontré este perrito cerca del Parque Kennedy.
        </p>

    </div>

</div>

<nav class="bottom-nav">

    <a href="home.html" class="active">
        <i class="fa-solid fa-house"></i>
        <span>Inicio</span>
    </a>

    <a href="buscar.html">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Buscar</span>
    </a>

    <a href="reportar.html">
        <i class="fa-solid fa-circle-plus"></i>
        <span>Reportar</span>
    </a>

    <a href="mapa.html">
        <i class="fa-solid fa-map"></i>
        <span>Mapa</span>
    </a>

    <a href="perfil.html">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
    </a>

</nav>

</body>
</html>
