<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrar Mascota</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="phone-container">

    <div class="page-header">

        <a href="mis-mascotas.html">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h2>Nueva Mascota</h2>

    </div>

    <form id="petForm">

        <div class="photo-upload">

            <img
            id="previewImage"
            src="https://via.placeholder.com/150"
            alt="Mascota">

            <input
            type="file"
            id="petPhoto"
            accept="image/*">

        </div>

        <div class="input-group">
            <label>Nombre</label>
            <input type="text" id="nombreMascota">
        </div>

        <div class="input-group">
            <label>Especie</label>

            <select id="especie">

                <option value="">
                    Selecciona
                </option>

                <option>
                    Perro
                </option>

                <option>
                    Gato
                </option>

                <option>
                    Ave
                </option>

            </select>

        </div>

        <div class="input-group">
            <label>Raza</label>
            <input type="text" id="raza">
        </div>

        <div class="input-group">
            <label>Edad</label>
            <input type="number" id="edad">
        </div>

        <div class="input-group">
            <label>Color</label>
            <input type="text" id="color">
        </div>

        <div class="input-group">
            <label>Características</label>

            <textarea
            id="caracteristicas"
            rows="4"></textarea>

        </div>

        <button
        type="submit"
        class="btn-primary">

            Guardar Mascota

        </button>

    </form>

</div>

<script src="js/mascotas.js"></script>

</body>
</html>
