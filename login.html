<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión - PetFinder</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="phone-container">

    <div class="logo-section">

        <div class="logo"
        nclick="window.location.href='index.html'"
        style="cursor:pointer;">
            <i class="fa-solid fa-paw"></i>
            <span>PetFinder</span>
        </div>

    </div>

    <div class="login-content">

        <h2>Iniciar sesión</h2>

        <p class="login-subtitle">
            Ingresa para continuar ayudando a reunir familias con sus mascotas.
        </p>

        <form id="loginForm">

            <div class="input-group">

                <label>Correo electrónico</label>

                <input
                    type="email"
                    id="email"
                    placeholder="ejemplo@correo.com"
                >

            </div>

            <div class="input-group">

                <label>Contraseña</label>

                <div class="password-container">

                    <input
                        type="password"
                        id="password"
                        placeholder="********"
                    >

                    <i
                        class="fa-solid fa-eye"
                        id="togglePassword"
                    ></i>

                </div>

            </div>

            <a href="#" class="forgot-link">
                ¿Olvidaste tu contraseña?
            </a>

            <button type="submit" class="btn-primary login-btn">
                Iniciar sesión
            </button>

            <p style="text-align:center;margin-top:15px;">

            <a href="recuperar-cuenta.html">

                ¿Olvidaste tu contraseña?

            </a>

            </p>

        </form>

        <div class="divider">
            <span>O CONTINÚA CON</span>
        </div>

        <div class="social-buttons">

            <button
class="social-btn"
onclick="loginGoogle()">

    Google

</button>

            <button class="social-btn">
                <i class="fab fa-facebook-f"></i>
                Facebook
            </button>

        </div>

        <p class="register-link">
            ¿No tienes cuenta?
            <a href="register.html">Crear una aquí</a>
        </p>

    </div>

</div>

<script src="js/app.js"></script>

<script>

function loginGoogle(){

    alert(
        "Inicio de sesión con Google exitoso"
    );

    window.location.href =
    "home.html";

}

</script>

</body>
</html>
